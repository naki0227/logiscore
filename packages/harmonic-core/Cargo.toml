[package]
name = "harmonic-core"
version = "0.1.0"
edition = "2021"
description = "Logiscore: Reversible source code to MIDI encoder/decoder"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "logiscore"
path = "src/main.rs"


[dependencies]
flate2 = "1"
midly = { version = "0.5", features = ["alloc"] }
thiserror = "2"
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
clap = { version = "4.5", features = ["derive"] }

[dev-dependencies]
proptest = "1"
